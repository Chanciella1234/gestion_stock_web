<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>StockPro — Détail produit</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="/css/style.css">
  <script src="/js/theme.js"></script>
  <style>
    .detail-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 32px; margin-bottom: 32px; }
    .detail-image { height: 360px; background: var(--bg-700); border: 1px solid var(--border); border-radius: var(--radius-lg); display: flex; align-items: center; justify-content: center; font-size: 64px; color: var(--text-muted); }
    .detail-image img { width: 100%; height: 100%; object-fit: cover; border-radius: var(--radius-lg); }
    .detail-info h1 { font-size: 24px; margin-bottom: 8px; }
    .detail-cat { font-size: 12px; color: var(--text-muted); margin-bottom: 12px; }
    .detail-cat i { margin-right: 4px; }
    .detail-price { font-size: 28px; font-weight: 600; color: var(--blue-400); margin-bottom: 16px; }
    .detail-price-old { font-size: 16px; color: var(--text-muted); text-decoration: line-through; margin-right: 8px; }
    .detail-desc { font-size: 14px; color: var(--text-secondary); line-height: 1.7; margin-bottom: 16px; }
    .detail-stock { display: flex; align-items: center; gap: 8px; font-size: 13px; margin-bottom: 20px; padding: 8px 12px; border-radius: var(--radius-md); }
    .detail-stock.ok { background: var(--green-100); color: var(--green-300); }
    .detail-stock.low { background: var(--amber-100); color: var(--amber-300); }
    .detail-stock.out { background: var(--red-100); color: var(--red-300); }
    .detail-actions { display: flex; align-items: center; gap: 16px; flex-wrap: wrap; }
    .qty-selector { display: flex; align-items: center; gap: 0; border: 1px solid var(--border); border-radius: var(--radius-md); overflow: hidden; }
    .qty-selector button { width: 36px; height: 36px; background: var(--bg-600); border: none; color: var(--text-primary); font-size: 14px; cursor: pointer; transition: background .15s; }
    .qty-selector button:hover { background: var(--bg-500); }
    .qty-selector input { width: 44px; text-align: center; background: var(--bg-700); border: none; border-left: 1px solid var(--border); border-right: 1px solid var(--border); color: var(--text-primary); font-size: 14px; height: 36px; }

    .reviews-section { margin-top: 32px; }
    .reviews-section h2 { margin-bottom: 20px; }
    .avis-card { background: var(--bg-700); border: 1px solid var(--border); border-radius: var(--radius-md); padding: 16px; margin-bottom: 12px; }
    .avis-card .header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; }
    .avis-card .user { font-size: 13px; font-weight: 500; color: var(--text-primary); }
    .avis-card .user i { margin-right: 6px; color: var(--text-muted); }
    .avis-card .date { font-size: 11px; color: var(--text-muted); }
    .avis-card .comment { font-size: 13px; color: var(--text-secondary); line-height: 1.6; }
    .avis-form { background: var(--bg-700); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 20px; margin-top: 20px; }
    .avis-form h3 { margin-bottom: 16px; }

    @media (max-width: 768px) {
      .detail-grid { grid-template-columns: 1fr; }
      .detail-image { height: 240px; }
    }
  </style>
</head>
<body>
  <div id="navbar-container"></div>

  <div style="max-width:1000px;margin:0 auto;padding:24px">
    <div class="breadcrumb">
      <a href="/views/produits/catalogue.html"><i class="fas fa-store"></i> Catalogue</a>
      <span class="sep"><i class="fas fa-chevron-right"></i></span>
      <span class="current" id="breadcrumbName">Produit</span>
    </div>

    <div id="productDetail"></div>

    <!-- Reviews -->
    <div class="reviews-section">
      <h2><i class="fas fa-star" style="color:var(--amber-400)"></i> Avis clients</h2>
      <div id="avisList">
        <div style="text-align:center;padding:20px;color:var(--text-muted)"><i class="fas fa-spinner fa-spin"></i> Chargement...</div>
      </div>

      <div class="avis-form" id="avisForm" style="display:none">
        <h3><i class="fas fa-pen"></i> Donner mon avis</h3>
        <div class="form-group">
          <label class="form-label">Note</label>
          <div class="etoiles-input" id="starRating">
            <i class="far fa-star etoile-btn" data-note="1"></i>
            <i class="far fa-star etoile-btn" data-note="2"></i>
            <i class="far fa-star etoile-btn" data-note="3"></i>
            <i class="far fa-star etoile-btn" data-note="4"></i>
            <i class="far fa-star etoile-btn" data-note="5"></i>
          </div>
        </div>
        <div class="form-group">
          <label class="form-label" for="avisCommentaire">Commentaire</label>
          <textarea class="form-control" id="avisCommentaire" placeholder="Partagez votre expérience..." rows="3"></textarea>
        </div>
        <button class="btn btn-primary" id="submitAvis"><i class="fas fa-paper-plane"></i> Envoyer</button>
      </div>
    </div>
  </div>

  <div id="footer-container"></div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="/js/auth.js"></script>
  <script src="/js/navbar.js"></script>
  <script src="/js/produits.js"></script>
  <script>
    let noteSelectionnee = 0;

    document.addEventListener('DOMContentLoaded', () => {
      chargerDetailProduit();
      chargerAvis();
      initialiserEtoiles();
    });

    async function chargerDetailProduit() {
      const params = new URLSearchParams(window.location.search);
      const id = params.get('id');
      if (!id) return;

      try {
        const res = await fetch(API + '/produits/' + id);
        const data = await res.json();

        if (data.success) {
          const p = data.data;
          const container = document.getElementById('productDetail');
          const bcName = document.getElementById('breadcrumbName');
          if (bcName) bcName.textContent = p.nom;

          let stockClass = 'out';
          let stockIcon = 'fa-times-circle';
          let stockText = 'Rupture de stock';
          if (p.stock > 0 && p.stock <= p.seuil_alerte) { stockClass = 'low'; stockIcon = 'fa-exclamation-triangle'; stockText = 'Stock faible (' + p.stock + ' unités)'; }
          else if (p.stock > 0) { stockClass = 'ok'; stockIcon = 'fa-check-circle'; stockText = 'En stock (' + p.stock + ' disponibles)'; }

          const imgHtml = p.image && p.image !== 'default-product.png'
            ? `<img src="/images/${p.image}" alt="${p.nom}">`
            : `<i class="fas fa-box-open"></i>`;
          const stars = p.moyenne_notes ? '<div class="etoiles" style="margin-bottom:12px">' + '<i class="fas fa-star"></i>'.repeat(Math.round(p.moyenne_notes)) + ' <span style="color:var(--text-muted);font-size:12px">(' + (p.nb_avis || 0) + ')</span></div>' : '';

          container.innerHTML = `
            <div class="detail-grid">
              <div class="detail-image">${imgHtml}</div>
              <div class="detail-info">
                <div class="detail-cat"><i class="fas fa-tag"></i> ${p.categorie ? p.categorie.nom : 'Général'}</div>
                <h1>${p.nom}</h1>
                ${stars}
                <div class="detail-price">${p.prix.toFixed(2)}FBU</div>
                <div class="detail-desc">${p.description || 'Aucune description disponible.'}</div>
                <div class="detail-stock ${stockClass}"><i class="fas ${stockIcon}"></i> ${stockText}</div>
                <div class="detail-actions">
                  <div class="qty-selector">
                    <button onclick="changerQty(-1)"><i class="fas fa-minus"></i></button>
                    <input type="text" id="qtyInput" value="1" readonly>
                    <button onclick="changerQty(1)"><i class="fas fa-plus"></i></button>
                  </div>
                  <button class="btn btn-primary" onclick="ajouterPanier('${p._id}')" ${p.stock === 0 ? 'disabled' : ''}>
                    <i class="fas fa-shopping-cart"></i> Ajouter au panier
                  </button>
                </div>
              </div>
            </div>
          `;
        }
      } catch (e) {}
    }

    function changerQty(delta) {
      const input = document.getElementById('qtyInput');
      if (!input) return;
      let val = parseInt(input.value) + delta;
      if (val < 1) val = 1;
      input.value = val;
    }

    async function ajouterPanier(produitId) {
      const token = localStorage.getItem('token');
      if (!token) { window.location.href = '/views/auth/login.html'; return; }

      const quantite = parseInt(document.getElementById('qtyInput').value);
      try {
        const res = await fetch(API + '/panier/ajouter', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token },
          body: JSON.stringify({ produitId, quantite })
        });
        const data = await res.json();
        if (data.success) {
          const btn = document.querySelector('.detail-actions .btn-primary');
          if (btn) {
            btn.innerHTML = '<i class="fas fa-check"></i> Ajouté !';
            btn.className = 'btn btn-success';
            setTimeout(() => {
              btn.innerHTML = '<i class="fas fa-shopping-cart"></i> Ajouter au panier';
              btn.className = 'btn btn-primary';
            }, 2000);
          }
        } else {
          alert(data.message);
        }
      } catch (e) {
        alert('Erreur lors de l\'ajout au panier.');
      }
    }

    async function chargerAvis() {
      const params = new URLSearchParams(window.location.search);
      const id = params.get('id');
      if (!id) return;

      try {
        const res = await fetch(API + '/avis?produit=' + id + '&valide=true');
        const data = await res.json();

        const container = document.getElementById('avisList');
        if (data.success && data.data.length > 0) {
          container.innerHTML = data.data.map(a => `
            <div class="avis-card">
              <div class="header">
                <span class="user"><i class="fas fa-user-circle"></i> ${a.utilisateur ? a.utilisateur.nom : 'Anonyme'}</span>
                <span class="date">${new Date(a.createdAt).toLocaleDateString('fr-FR')}</span>
              </div>
              <div class="etoiles" style="margin-bottom:6px">${'<i class="fas fa-star"></i>'.repeat(a.note)}${'<i class="far fa-star"></i>'.repeat(5 - a.note)}</div>
              <div class="comment">${a.commentaire || ''}</div>
            </div>
          `).join('');
        } else {
          container.innerHTML = '<div style="text-align:center;padding:30px;color:var(--text-muted)"><i class="far fa-star" style="font-size:28px;margin-bottom:8px"></i><h3>Aucun avis</h3><p>Soyez le premier à donner votre avis !</p></div>';
        }
      } catch (e) {}

      const token = localStorage.getItem('token');
      if (token) {
        document.getElementById('avisForm').style.display = 'block';
      }
    }

    function initialiserEtoiles() {
      const stars = document.querySelectorAll('#starRating i');
      if (!stars.length) return;

      stars.forEach(star => {
        star.addEventListener('click', () => {
          noteSelectionnee = parseInt(star.dataset.note);
          stars.forEach((s, i) => {
            s.className = i < noteSelectionnee ? 'fas fa-star etoile-btn on' : 'far fa-star etoile-btn';
          });
        });
        star.addEventListener('mouseenter', () => {
          const note = parseInt(star.dataset.note);
          stars.forEach((s, i) => {
            s.className = i < note ? 'fas fa-star etoile-btn on' : 'far fa-star etoile-btn';
          });
        });
        star.addEventListener('mouseleave', () => {
          stars.forEach((s, i) => {
            s.className = i < noteSelectionnee ? 'fas fa-star etoile-btn on' : 'far fa-star etoile-btn';
          });
        });
      });

      const btn = document.getElementById('submitAvis');
      if (btn) {
        btn.addEventListener('click', async () => {
          const params = new URLSearchParams(window.location.search);
          const produitId = params.get('id');
          const token = localStorage.getItem('token');
          const commentaire = document.getElementById('avisCommentaire').value;

          if (noteSelectionnee === 0) { alert('Veuillez sélectionner une note.'); return; }

          try {
            const res = await fetch(API + '/avis', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token },
              body: JSON.stringify({ produit: produitId, note: noteSelectionnee, commentaire })
            });
            const data = await res.json();
            if (data.success) {
              btn.innerHTML = '<i class="fas fa-check"></i> Avis envoyé !';
              btn.disabled = true;
              document.getElementById('avisCommentaire').value = '';
              setTimeout(() => {
                btn.innerHTML = '<i class="fas fa-paper-plane"></i> Envoyer';
                btn.disabled = false;
              }, 2000);
            } else {
              alert(data.message);
            }
          } catch (e) {
            alert('Erreur lors de l\'envoi.');
          }
        });
      }
    }
  </script>
</body>
</html>
