<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>StockPro — Catalogue</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="/css/style.css">
  <script src="/js/theme.js"></script>
  <style>
    .catalogue-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; flex-wrap: wrap; gap: 8px; }
    .catalogue-header h1 { margin: 0; }
    .result-count { font-size: 13px; color: var(--text-secondary); }
    .pagination { display: flex; gap: 6px; justify-content: center; margin-top: 24px; }
    .page-btn { width: 34px; height: 34px; border-radius: var(--radius-md); background: var(--bg-600); border: 1px solid var(--border); color: var(--text-secondary); font-size: 13px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all .15s; }
    .page-btn:hover, .page-btn.active { background: var(--blue-500); color: #fff; border-color: var(--blue-500); }
    .page-btn:disabled { opacity: .3; cursor: not-allowed; }
    .filtres-bar .form-control { max-width: 180px; }
    #categoryList { display: flex; gap: 6px; flex-wrap: wrap; }
    #categoryList button { font-size: 12px; }
  </style>
</head>
<body>
  <div id="navbar-container"></div>

  <div style="max-width:1200px;margin:0 auto;padding:24px">
    <div class="catalogue-header">
      <div class="flex items-center gap-sm">
        <h1><i class="fas fa-store"></i> Catalogue</h1>
        <span class="result-count" id="resultCount"></span>
      </div>
    </div>

    <!-- Filters -->
    <div class="filtres-bar">
      <input type="text" class="form-control" id="searchInput" placeholder="Rechercher..." style="max-width:200px">
      <div id="categoryList"></div>
      <input type="number" class="form-control" id="minPrice" placeholder="Prix min" min="0" style="width:100px">
      <input type="number" class="form-control" id="maxPrice" placeholder="Prix max" min="0" style="width:100px">
      <button class="btn btn-primary btn-sm" id="applyFilters"><i class="fas fa-search"></i> Rechercher</button>
      <button class="btn btn-secondary btn-sm" id="clearFilters"><i class="fas fa-times"></i> Effacer</button>
    </div>

    <!-- Products Grid -->
    <div class="produits-grid" id="productsGrid">
      <div style="grid-column:1/-1;text-align:center;padding:40px;color:var(--text-muted)">
        <i class="fas fa-spinner fa-spin" style="font-size:28px"></i>
        <p style="margin-top:12px">Chargement...</p>
      </div>
    </div>

    <!-- Pagination -->
    <div class="pagination" id="pagination"></div>
  </div>

  <div id="footer-container"></div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="/js/auth.js"></script>
  <script src="/js/navbar.js"></script>
  <script src="/js/produits.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      chargerCategoriesFiltres();
      chargerProduits();
      initialiserFiltres();

      const params = new URLSearchParams(window.location.search);
      const catId = params.get('categorie');
      if (catId && document.querySelector(`#categoryList button[data-id="${catId}"]`)) {
        setTimeout(() => {
          document.querySelectorAll('#categoryList button').forEach(b => b.classList.remove('active'));
          const btn = document.querySelector(`#categoryList button[data-id="${catId}"]`);
          if (btn) { btn.classList.add('active'); chargerProduits(); }
        }, 500);
      }
    });

    async function chargerCategoriesFiltres() {
      const list = document.getElementById('categoryList');
      if (!list) return;
      try {
        const res = await fetch(API + '/categories');
        const data = await res.json();
        if (data.success) {
          const allBtn = document.createElement('button');
          allBtn.className = 'filtre-chip active';
          allBtn.textContent = 'Toutes';
          allBtn.addEventListener('click', () => {
            document.querySelectorAll('#categoryList button').forEach(b => b.classList.remove('active'));
            allBtn.classList.add('active');
            chargerProduits();
          });
          list.appendChild(allBtn);

          data.data.forEach(c => {
            const btn = document.createElement('button');
            btn.className = 'filtre-chip';
            btn.dataset.id = c._id;
            btn.textContent = c.nom;
            btn.addEventListener('click', () => {
              document.querySelectorAll('#categoryList button').forEach(b => b.classList.remove('active'));
              btn.classList.add('active');
              chargerProduits();
            });
            list.appendChild(btn);
          });
        }
      } catch (e) {}
    }

    let produitsData = {};

    async function chargerProduits() {
      const grid = document.getElementById('productsGrid');
      const count = document.getElementById('resultCount');
      const pagination = document.getElementById('pagination');
      if (!grid) return;

      const cat = document.querySelector('#categoryList button.active:not(:first-child)');
      const categorie = cat ? cat.dataset.id : '';
      const recherche = document.getElementById('searchInput') ? document.getElementById('searchInput').value : '';
      const minPrix = document.getElementById('minPrice') ? document.getElementById('minPrice').value : '';
      const maxPrix = document.getElementById('maxPrice') ? document.getElementById('maxPrice').value : '';

      const params = new URLSearchParams({ limit: 12 });
      if (categorie) params.set('categorie', categorie);
      if (recherche) params.set('recherche', recherche);
      if (minPrix) params.set('minPrix', minPrix);
      if (maxPrix) params.set('maxPrix', maxPrix);

      try {
        const res = await fetch(API + '/produits?' + params);
        const data = await res.json();

        if (data.success) {
          produitsData = data;
          if (count) count.textContent = data.pagination ? `(${data.pagination.total} produits)` : '';

          if (data.data.length === 0) {
            grid.innerHTML = '<div style="grid-column:1/-1;text-align:center;padding:60px 20px;color:var(--text-muted)"><i class="fas fa-box-open" style="font-size:36px;margin-bottom:12px"></i><h3>Aucun produit trouvé</h3><p>Essayez de modifier vos filtres.</p></div>';
          } else {
            grid.innerHTML = data.data.map(p => {
              const stockClass = p.stock === 0 ? 'badge-stock-out' : (p.stock <= p.seuil_alerte ? 'badge-stock-low' : 'badge-stock-ok');
              const stockText = p.stock === 0 ? 'Rupture' : (p.stock <= p.seuil_alerte ? 'Stock faible' : 'En stock');
              const imgHtml = p.image && p.image !== 'default-product.png'
                ? `<img src="/images/${p.image}" alt="${p.nom}">`
                : `<i class="fas fa-box-open"></i>`;
              const stars = p.moyenne_notes ? '<span class="etoiles">' + '<i class="fas fa-star"></i>'.repeat(Math.round(p.moyenne_notes)) + '</span>' : '';
              return `
                <div class="produit-card ${p.stock === 0 ? 'out-of-stock' : ''}" onclick="window.location='/views/produits/detail.html?id=${p._id}'">
                  <div class="produit-img">${imgHtml}</div>
                  <div class="produit-body">
                    <div class="produit-cat">${p.categorie ? p.categorie.nom : 'Général'}</div>
                    <div class="produit-nom">${p.nom}</div>
                    ${stars}
                    <div class="produit-prix">${p.prix.toFixed(2)}FBU</div>
                    <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap">
                      <span class="badge ${stockClass}">${stockText}</span>
                      <button class="btn btn-primary btn-sm" onclick="event.stopPropagation();ajouterPanierDirect('${p._id}')"><i class="fas fa-cart-plus"></i></button>
                    </div>
                  </div>
                </div>
              `;
            }).join('');
          }

          if (pagination && data.pagination) {
            const pages = data.pagination.pages || 1;
            const page = data.pagination.page || 1;
            pagination.innerHTML = '';
            if (pages > 1) {
              const prev = document.createElement('button');
              prev.className = 'page-btn';
              prev.innerHTML = '<i class="fas fa-chevron-left"></i>';
              prev.disabled = page <= 1;
              prev.addEventListener('click', () => chargerProduitsPage(page - 1));
              pagination.appendChild(prev);
              for (let i = 1; i <= pages; i++) {
                const btn = document.createElement('button');
                btn.className = 'page-btn' + (i === page ? ' active' : '');
                btn.textContent = i;
                btn.addEventListener('click', () => chargerProduitsPage(i));
                pagination.appendChild(btn);
              }
              const next = document.createElement('button');
              next.className = 'page-btn';
              next.innerHTML = '<i class="fas fa-chevron-right"></i>';
              next.disabled = page >= pages;
              next.addEventListener('click', () => chargerProduitsPage(page + 1));
              pagination.appendChild(next);
            }
          }
        }
      } catch (e) {
        grid.innerHTML = '<div style="grid-column:1/-1;text-align:center;padding:60px 20px;color:var(--text-muted)"><i class="fas fa-exclamation-triangle" style="font-size:36px;margin-bottom:12px"></i><h3>Erreur de chargement</h3></div>';
      }
    }

    function chargerProduitsPage(page) {
      chargerProduits();
    }

    function initialiserFiltres() {
      const btn = document.getElementById('applyFilters');
      const clear = document.getElementById('clearFilters');
      if (btn) btn.addEventListener('click', chargerProduits);
      if (clear) clear.addEventListener('click', () => {
        document.getElementById('searchInput').value = '';
        document.getElementById('minPrice').value = '';
        document.getElementById('maxPrice').value = '';
        document.querySelectorAll('#categoryList button').forEach(b => b.classList.remove('active'));
        const first = document.querySelector('#categoryList button');
        if (first) first.classList.add('active');
        chargerProduits();
      });
      const search = document.getElementById('searchInput');
      if (search) {
        search.addEventListener('keyup', (e) => {
          if (e.key === 'Enter') chargerProduits();
        });
      }
    }

    async function ajouterPanierDirect(produitId) {
      const token = localStorage.getItem('token');
      if (!token) { window.location.href = '/views/auth/login.html'; return; }
      try {
        const res = await fetch(API + '/panier/ajouter', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token },
          body: JSON.stringify({ produitId, quantite: 1 })
        });
        const data = await res.json();
        if (data.success) {
          showToast('Produit ajouté au panier', 'success');
        } else {
          showToast(data.message, 'error');
        }
      } catch (e) {
        showToast('Erreur lors de l\'ajout.', 'error');
      }
    }

    function showToast(msg, type) {
      let container = document.querySelector('.toast-container');
      if (!container) {
        container = document.createElement('div');
        container.className = 'toast-container';
        document.body.appendChild(container);
      }
      const toast = document.createElement('div');
      toast.className = 'toast toast-' + type;
      toast.innerHTML = '<i class="fas ' + (type === 'success' ? 'fa-check-circle' : 'fa-exclamation-circle') + '"></i> ' + msg;
      container.appendChild(toast);
      setTimeout(() => { toast.remove(); }, 3000);
    }
  </script>
</body>
</html>
