<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>StockPro — Alertes</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="/css/style.css">
  <link rel="stylesheet" href="/css/admin.css">
  <script src="/js/theme.js"></script>
  <style>
    .admin-tabs { display: flex; gap: 0; margin-bottom: 20px; background: var(--bg-700); border: 1px solid var(--border); border-radius: var(--radius-lg); overflow: hidden; }
    .admin-tab { padding: 10px 24px; font-size: 13px; font-weight: 500; color: var(--text-secondary); cursor: pointer; transition: all .15s; border-right: 1px solid var(--border); }
    .admin-tab:last-child { border-right: none; }
    .admin-tab:hover { color: var(--text-primary); background: var(--bg-600); }
    .admin-tab.active { color: var(--text-primary); background: var(--bg-500); }
    .tab-content { display: none; }
    .tab-content.active { display: block; }
    .alerte-item { background: var(--bg-700); border: 1px solid var(--border); border-radius: var(--radius-md); padding: 14px; margin-bottom: 10px; display: flex; align-items: center; gap: 12px; }
    .alerte-item.resolue { opacity: .6; }
    .alerte-item .info { flex: 1; }
    .alerte-item .info h4 { font-size: 14px; margin: 0 0 4px; }
    .alerte-item .info p { font-size: 12px; margin: 0; color: var(--text-secondary); }
    .alerte-item .info .date { font-size: 11px; color: var(--text-muted); }
    .alerte-item .actions { display: flex; gap: 6px; }
    .empty-state { text-align: center; padding: 60px 20px; color: var(--text-muted); }
    .empty-state i { font-size: 36px; margin-bottom: 12px; }
  </style>
</head>
<body data-page="alertes">
  <div class="page-wrapper">
    <div id="adminSidebar"></div>
    <div class="main-content">
      <div class="flex items-center justify-between mb-2">
        <h1><i class="fas fa-bell"></i> Alertes de stock</h1>
        <span class="badge badge-pending" id="alertesActives">0</span>
      </div>

      <div class="admin-tabs">
        <div class="admin-tab active" data-tab="actives"><i class="fas fa-exclamation-triangle"></i> Actives</div>
        <div class="admin-tab" data-tab="resolues"><i class="fas fa-check-circle"></i> Résolues</div>
        <div class="admin-tab" data-tab="toutes"><i class="fas fa-list"></i> Toutes</div>
      </div>

      <div class="tab-content active" id="tab-actives">
        <div id="alertesContainerActives"><p class="empty-state"><i class="fas fa-spinner fa-spin"></i> Chargement...</p></div>
      </div>
      <div class="tab-content" id="tab-resolues">
        <div id="alertesContainerResolues"><p class="empty-state"><i class="fas fa-spinner fa-spin"></i> Chargement...</p></div>
      </div>
      <div class="tab-content" id="tab-toutes">
        <div id="alertesContainerToutes"><p class="empty-state"><i class="fas fa-spinner fa-spin"></i> Chargement...</p></div>
      </div>
    </div>
  </div>

  <!-- Modal Réapprovisionner -->
  <div class="modal-overlay" id="modalReappro" style="display:none">
    <div class="modal">
      <div class="modal-header">
        <span class="modal-title">Réapprovisionner</span>
        <button class="modal-close" onclick="fermerModal('modalReappro')">&times;</button>
      </div>
      <p style="font-size:13px;color:var(--text-secondary)">Produit : <strong id="reapproProduitNom"></strong></p>
      <p style="font-size:12px;color:var(--text-muted)">Stock actuel : <span id="reapproStockActuel">0</span></p>
      <div class="form-group">
        <label class="form-label">Quantité à ajouter</label>
        <input type="number" class="form-control" id="reapproQuantite" min="1" value="10">
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" onclick="fermerModal('modalReappro')">Annuler</button>
        <button class="btn btn-success" id="btnReappro"><i class="fas fa-boxes"></i> Confirmer</button>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="/js/auth.js"></script>
  <script src="/js/navbar.js"></script>
  <script src="/js/admin.js"></script>
  <script>
    let toutesAlertes = [];

    document.addEventListener('DOMContentLoaded', () => {
      verifierAuth();
      chargerAlertesAdmin();
      initialiserTabs();
      document.getElementById('btnReappro').addEventListener('click', confirmerReappro);
    });

    function verifierAuth() {
      const token = localStorage.getItem('token');
      if (!token) { window.location.href = '/views/auth/login.html'; return; }
      try {
        const user = JSON.parse(localStorage.getItem('user'));
        if (!user || user.role !== 'admin') window.location.href = '/views/produits/catalogue.html';
      } catch (e) { window.location.href = '/views/auth/login.html'; }
    }

    function ouvrirModal(id) { document.getElementById(id).style.display = 'flex'; }
    function fermerModal(id) { document.getElementById(id).style.display = 'none'; }
    function getToken() { return localStorage.getItem('token'); }

    function initialiserTabs() {
      document.querySelectorAll('.admin-tabs .admin-tab').forEach(tab => {
        tab.addEventListener('click', () => {
          document.querySelectorAll('.admin-tabs .admin-tab').forEach(t => t.classList.remove('active'));
          document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
          tab.classList.add('active');
          document.getElementById('tab-' + tab.dataset.tab).classList.add('active');
          afficherAlertes(tab.dataset.tab);
        });
      });
    }

    async function chargerAlertesAdmin() {
      const token = getToken();
      try {
        const res = await fetch(API + '/alertes', {
          headers: { 'Authorization': 'Bearer ' + token }
        });
        const data = await res.json();
        if (data.success) {
          toutesAlertes = data.data;
          const actives = toutesAlertes.filter(a => !a.resolu);
          document.getElementById('alertesActives').textContent = actives.length + ' active' + (actives.length > 1 ? 's' : '');
          afficherAlertes('actives');
          afficherAlertes('resolues');
          afficherAlertes('toutes');
        }
      } catch (e) {}
    }

    function afficherAlertes(tab) {
      const containers = {
        actives: document.getElementById('alertesContainerActives'),
        resolues: document.getElementById('alertesContainerResolues'),
        toutes: document.getElementById('alertesContainerToutes')
      };
      const container = containers[tab];
      if (!container) return;

      let alertes;
      if (tab === 'actives') alertes = toutesAlertes.filter(a => !a.resolu);
      else if (tab === 'resolues') alertes = toutesAlertes.filter(a => a.resolu);
      else alertes = toutesAlertes;

      if (alertes.length === 0) {
        container.innerHTML = '<div class="empty-state"><i class="fas fa-bell-slash"></i><h3>Aucune alerte</h3><p>' + (tab === 'actives' ? 'Tout est sous contrôle !' : (tab === 'resolues' ? 'Aucune alerte résolue.' : 'Aucune alerte.')) + '</p></div>';
        return;
      }

      container.innerHTML = alertes.map(a => {
        const typeBadge = a.type === 'rupture' ? 'badge-stock-out' : 'badge-stock-low';
        const typeText = a.type === 'rupture' ? 'Rupture' : 'Stock faible';
        const nomProduit = a.produit ? a.produit.nom : 'Produit supprimé';
        const stockInfo = a.produit ? `Stock: ${a.produit.stock || 0} / Seuil: ${a.produit.seuil_alerte || 0}` : '';
        return `
          <div class="alerte-item ${a.resolu ? 'resolue' : ''}">
            <span class="badge ${typeBadge}">${typeText}</span>
            <div class="info">
              <h4>${nomProduit}</h4>
              <p>${a.message} ${stockInfo ? '— ' + stockInfo : ''}</p>
              <span class="date">${new Date(a.createdAt).toLocaleDateString('fr-FR')}</span>
            </div>
            <div class="actions">
              ${!a.resolu ? `
                <button class="btn btn-sm btn-success" onclick="resoudreAlerte('${a._id}')"><i class="fas fa-check"></i> Résoudre</button>
                <button class="btn btn-sm btn-primary" onclick="ouvrirReappro('${a._id}')"><i class="fas fa-boxes"></i> Réapprovisionner</button>
              ` : '<span style="font-size:12px;color:var(--green-400)"><i class="fas fa-check-circle"></i> Résolue</span>'}
            </div>
          </div>
        `;
      }).join('');
    }

    async function resoudreAlerte(id) {
      try {
        const res = await fetch(API + '/alertes/' + id + '/resoudre', {
          method: 'PATCH',
          headers: { 'Authorization': 'Bearer ' + getToken() }
        });
        const data = await res.json();
        if (data.success) chargerAlertesAdmin();
      } catch (e) {}
    }

    let reapproAlerteId = null;

    function ouvrirReappro(alerteId) {
      const alerte = toutesAlertes.find(a => a._id === alerteId);
      if (!alerte || !alerte.produit) return;
      reapproAlerteId = alerteId;
      document.getElementById('reapproProduitNom').textContent = alerte.produit.nom || 'Produit';
      document.getElementById('reapproStockActuel').textContent = alerte.produit.stock || 0;
      document.getElementById('reapproQuantite').value = 10;
      ouvrirModal('modalReappro');
    }

    async function confirmerReappro() {
      const alerte = toutesAlertes.find(a => a._id === reapproAlerteId);
      if (!alerte || !alerte.produit) return;
      const produitId = alerte.produit._id || alerte.produit;
      const quantite = parseInt(document.getElementById('reapproQuantite').value);
      if (quantite < 1) { alert('Quantité invalide.'); return; }

      try {
        const res = await fetch(API + '/produits/' + produitId, {
          method: 'PUT',
          headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + getToken() },
          body: JSON.stringify({
            stock: (alerte.produit.stock || 0) + quantite
          })
        });
        const data = await res.json();
        if (data.success) {
          fermerModal('modalReappro');
          chargerAlertesAdmin();
        } else {
          alert(data.message);
        }
      } catch (e) {
        alert('Erreur lors du réapprovisionnement.');
      }
    }
  </script>
</body>
</html>
