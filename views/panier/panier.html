<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>StockPro — Mon panier</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="/css/style.css">
  <script src="/js/theme.js"></script>
  <style>
    .panier-columns { display: grid; grid-template-columns: 2fr 1fr; gap: 24px; align-items: start; }
    .panier-items { background: var(--bg-700); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 16px; }
    .panier-summary { background: var(--bg-700); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 20px; position: sticky; top: 80px; }
    .summary-row { display: flex; justify-content: space-between; font-size: 13px; padding: 8px 0; }
    .summary-row.total { font-size: 16px; font-weight: 600; color: var(--blue-400); border-top: 1px solid var(--border); margin-top: 8px; padding-top: 12px; }
    .empty-cart { text-align: center; padding: 60px 20px; }
    .empty-cart i { font-size: 48px; color: var(--text-muted); margin-bottom: 16px; }
    .empty-cart h3 { margin-bottom: 8px; }
    .empty-cart p { color: var(--text-secondary); margin-bottom: 20px; }
    .promo-input { display: flex; gap: 8px; }
    .promo-input input { flex: 1; }
    .promo-msg { font-size: 12px; margin-top: 6px; }
    .promo-msg.success { color: var(--green-400); }
    .promo-msg.error { color: var(--red-400); }
    .delete-btn { background: transparent; border: none; color: var(--text-muted); cursor: pointer; font-size: 16px; padding: 4px; transition: color .15s; }
    .delete-btn:hover { color: var(--red-400); }
    .panier-ligne .panier-img { width: 48px; height: 48px; }

    @media (max-width: 768px) {
      .panier-columns { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div id="navbar-container"></div>

  <div style="max-width:1000px;margin:0 auto;padding:24px">
    <h1 style="margin-bottom:20px"><i class="fas fa-shopping-cart"></i> Mon panier (<span id="panierCount">0</span>)</h1>

    <div class="panier-columns">
      <div class="panier-items" id="panierItems">
        <div style="text-align:center;padding:40px;color:var(--text-muted)">
          <i class="fas fa-spinner fa-spin" style="font-size:28px"></i>
          <p style="margin-top:12px">Chargement...</p>
        </div>
      </div>

      <div>
        <div class="panier-summary" id="panierSummary">
          <h3 style="margin-bottom:16px">Récapitulatif</h3>
          <div class="summary-row">
            <span>Sous-total</span>
            <span id="sousTotal">0.00FBU</span>
          </div>

          <div class="summary-row" id="promoLine" style="display:none">
            <span>Promotion</span>
            <span id="promoDiscount" style="color:var(--green-400)">-0.00FBU</span>
          </div>

          <div class="promo-input" style="margin:12px 0">
            <input type="text" class="form-control" id="codePromo" placeholder="Code promo">
            <button class="btn btn-secondary btn-sm" id="btnVerifierPromo"><i class="fas fa-tag"></i> Appliquer</button>
          </div>
          <div id="promoMessage"></div>

          <div class="summary-row total">
            <span>Total</span>
            <span id="totalPanier">0.00FBU</span>
          </div>

          <button class="btn btn-primary" id="btnCommander" style="width:100%;justify-content:center;padding:12px;margin-top:16px" disabled>
            <i class="fas fa-credit-card"></i> Passer la commande
          </button>
        </div>
      </div>
    </div>
  </div>

  <div id="footer-container"></div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="/js/auth.js"></script>
  <script src="/js/navbar.js"></script>
  <script src="/js/panier.js"></script>
  <script>
    let panierData = null;
    let promoAppliquee = null;

    document.addEventListener('DOMContentLoaded', () => {
      if (document.getElementById('panierItems')) {
        chargerPanier();
        initialiserPanier();
      }
    });

    async function chargerPanier() {
      const container = document.getElementById('panierItems');
      const count = document.getElementById('panierCount');
      const token = localStorage.getItem('token');
      if (!token) {
        container.innerHTML = '<div class="empty-cart"><i class="fas fa-shopping-cart"></i><h3>Connectez-vous</h3><p>Veuillez vous connecter pour voir votre panier.</p><a href="/views/auth/login.html" class="btn btn-primary"><i class="fas fa-sign-in-alt"></i> Connexion</a></div>';
        return;
      }

      try {
        const res = await fetch(API + '/panier', {
          headers: { 'Authorization': 'Bearer ' + token }
        });
        const data = await res.json();

        if (data.success) {
          panierData = data.data;
          if (!data.data.lignes || data.data.lignes.length === 0) {
            container.innerHTML = '<div class="empty-cart"><i class="fas fa-shopping-cart"></i><h3>Votre panier est vide</h3><p>Parcourez notre catalogue pour ajouter des produits.</p><a href="/views/produits/catalogue.html" class="btn btn-primary"><i class="fas fa-store"></i> Voir le catalogue</a></div>';
            const btn = document.getElementById('btnCommander');
            if (btn) btn.disabled = true;
            if (count) count.textContent = '0';
            mettreAJourTotal();
            return;
          }

          if (count) count.textContent = data.data.lignes.reduce((a, l) => a + l.quantite, 0);

          container.innerHTML = data.data.lignes.map((l, idx) => {
            const nom = l.produit ? l.produit.nom : 'Produit';
            const prix = l.prix_unitaire || 0;
            const imgHtml = l.produit && l.produit.image && l.produit.image !== 'default-product.png'
              ? `<img src="/images/${l.produit.image}" alt="${nom}" style="width:100%;height:100%;object-fit:cover;border-radius:var(--radius-md)">`
              : `<i class="fas fa-box-open"></i>`;
            return `
              <div class="panier-ligne" data-id="${l._id}">
                <div class="panier-img">${imgHtml}</div>
                <div style="flex:1;min-width:0">
                  <div class="panier-nom">${nom}</div>
                  <div class="panier-prix">${prix.toFixed(2)}FBU / unité</div>
                </div>
                <div class="qty-control">
                  <button class="qty-btn" onclick="changerQuantite('${l._id}', -1)"><i class="fas fa-minus"></i></button>
                  <span class="qty-val">${l.quantite}</span>
                  <button class="qty-btn" onclick="changerQuantite('${l._id}', 1)"><i class="fas fa-plus"></i></button>
                </div>
                <div class="panier-total">${(prix * l.quantite).toFixed(2)}FBU</div>
                <button class="delete-btn" onclick="supprimerLigne('${l._id}')" title="Supprimer"><i class="fas fa-trash-alt"></i></button>
              </div>
            `;
          }).join('');

          const btnCommander = document.getElementById('btnCommander');
          if (btnCommander) btnCommander.disabled = false;
          mettreAJourTotal();
        }
      } catch (e) {
        container.innerHTML = '<div class="empty-cart"><i class="fas fa-exclamation-triangle"></i><h3>Erreur de chargement</h3></div>';
      }
    }

    async function changerQuantite(ligneId, delta) {
      const token = localStorage.getItem('token');
      if (!panierData || !panierData.lignes) return;
      const ligne = panierData.lignes.find(l => l._id === ligneId);
      if (!ligne) return;
      const nouvelleQte = ligne.quantite + delta;
      if (nouvelleQte < 1) return;

      try {
        const res = await fetch(API + '/panier/' + ligneId, {
          method: 'PUT',
          headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token },
          body: JSON.stringify({ quantite: nouvelleQte })
        });
        const data = await res.json();
        if (data.success) {
          panierData = data.data;
          chargerPanier();
        }
      } catch (e) {}
    }

    async function supprimerLigne(ligneId) {
      if (!await confirmAsync('Supprimer cet article du panier ?')) return;
      const token = localStorage.getItem('token');
      try {
        const res = await fetch(API + '/panier/' + ligneId, {
          method: 'DELETE',
          headers: { 'Authorization': 'Bearer ' + token }
        });
        const data = await res.json();
        if (data.success) {
          panierData = data.data;
          chargerPanier();
        }
      } catch (e) {}
    }

    function mettreAJourTotal() {
      const sousTotalEl = document.getElementById('sousTotal');
      const totalEl = document.getElementById('totalPanier');
      const promoLine = document.getElementById('promoLine');
      const promoDiscount = document.getElementById('promoDiscount');

      if (!sousTotalEl || !totalEl) return;

      let sousTotal = 0;
      if (panierData && panierData.lignes) {
        sousTotal = panierData.lignes.reduce((acc, l) => acc + (l.prix_unitaire || 0) * l.quantite, 0);
      }

      sousTotalEl.textContent = sousTotal.toFixed(2) + 'FBU';
      let total = sousTotal;

      if (promoAppliquee) {
        if (promoAppliquee.type === 'pourcentage') {
          const reduction = sousTotal * (promoAppliquee.valeur / 100);
          total -= reduction;
          promoLine.style.display = 'flex';
          promoDiscount.textContent = '-' + reduction.toFixed(2) + 'FBU';
        } else if (promoAppliquee.type === 'fixe') {
          total = Math.max(0, total - promoAppliquee.valeur);
          promoLine.style.display = 'flex';
          promoDiscount.textContent = '-' + promoAppliquee.valeur.toFixed(2) + 'FBU';
        }
      } else {
        promoLine.style.display = 'none';
      }

      totalEl.textContent = total.toFixed(2) + 'FBU';
    }

    function initialiserPanier() {
      const btnVerifier = document.getElementById('btnVerifierPromo');
      const btnCommander = document.getElementById('btnCommander');

      if (btnVerifier) {
        btnVerifier.addEventListener('click', verifierPromo);
      }
      if (btnCommander) {
        btnCommander.addEventListener('click', passerCommande);
      }
      const codeInput = document.getElementById('codePromo');
      if (codeInput) {
        codeInput.addEventListener('keyup', (e) => {
          if (e.key === 'Enter') verifierPromo();
        });
      }
    }

    async function verifierPromo() {
      const code = document.getElementById('codePromo').value.trim();
      const msg = document.getElementById('promoMessage');

      if (!code) { msg.innerHTML = '<div class="promo-msg error">Entrez un code promo.</div>'; return; }

      try {
        const res = await fetch(API + '/promotions/verifier?code=' + encodeURIComponent(code));
        const data = await res.json();

        if (data.success) {
          promoAppliquee = data.data;
          msg.innerHTML = '<div class="promo-msg success"><i class="fas fa-check-circle"></i> ' + (data.data.description || 'Code appliqué') + '</div>';
          mettreAJourTotal();
        } else {
          promoAppliquee = null;
          msg.innerHTML = '<div class="promo-msg error"><i class="fas fa-times-circle"></i> ' + data.message + '</div>';
          mettreAJourTotal();
        }
      } catch (e) {
        promoAppliquee = null;
        msg.innerHTML = '<div class="promo-msg error">Erreur de vérification.</div>';
      }
    }

    async function passerCommande() {
      const token = localStorage.getItem('token');
      const btn = document.getElementById('btnCommander');
      btn.disabled = true;
      btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Traitement...';

      const body = {};
      if (promoAppliquee) {
        body.codePromo = promoAppliquee.code;
      }

      try {
        const res = await fetch(API + '/commandes', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token },
          body: JSON.stringify(body)
        });
        const data = await res.json();

        if (data.success) {
          promoAppliquee = null;
          window.location.href = '/views/commandes/confirmation.html?id=' + data.data._id;
        } else {
          alert(data.message);
          btn.disabled = false;
          btn.innerHTML = '<i class="fas fa-credit-card"></i> Passer la commande';
        }
      } catch (e) {
        alert('Erreur lors du paiement.');
        btn.disabled = false;
        btn.innerHTML = '<i class="fas fa-credit-card"></i> Passer la commande';
      }
    }
  </script>
</body>
</html>
