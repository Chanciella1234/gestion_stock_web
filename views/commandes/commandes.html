<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>StockPro — Mes commandes</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="/css/style.css">
  <script src="/js/theme.js"></script>
  <style>
    .statut-filtres { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 20px; }
    .statut-filtres button { padding: 6px 14px; border-radius: 20px; font-size: 12px; background: var(--bg-600); border: 1px solid var(--border); color: var(--text-secondary); cursor: pointer; transition: all .15s; }
    .statut-filtres button:hover, .statut-filtres button.active { background: var(--blue-100); color: var(--blue-200); border-color: var(--blue-500); }
    .commande-card { background: var(--bg-700); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 16px; margin-bottom: 16px; }
    .commande-card .header { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; margin-bottom: 12px; padding-bottom: 12px; border-bottom: 1px solid var(--border); }
    .commande-card .ref { font-size: 14px; font-weight: 500; color: var(--blue-400); }
    .commande-card .date { font-size: 12px; color: var(--text-secondary); margin-right: auto; }
    .commande-card .produits { margin-bottom: 12px; }
    .commande-card .prod-line { display: flex; align-items: center; gap: 8px; padding: 6px 0; font-size: 13px; }
    .commande-card .prod-line .nom { flex: 1; color: var(--text-primary); }
    .commande-card .prod-line .qty { color: var(--text-muted); }
    .commande-card .prod-line .prix { color: var(--blue-400); font-weight: 500; }
    .timeline { display: flex; align-items: center; gap: 4px; padding: 12px 0; flex-wrap: wrap; }
    .timeline-step { display: flex; align-items: center; gap: 4px; font-size: 11px; color: var(--text-muted); }
    .timeline-step i { font-size: 14px; }
    .timeline-step.done { color: var(--green-400); }
    .timeline-step.current { color: var(--blue-400); font-weight: 500; }
    .timeline-arrow { color: var(--border); font-size: 10px; }
    .commande-card .footer { display: flex; justify-content: space-between; align-items: center; padding-top: 12px; border-top: 1px solid var(--border); }
    .commande-card .total { font-size: 16px; font-weight: 600; }
    .commande-card .total span { color: var(--blue-400); }
    .empty-state { text-align: center; padding: 60px 20px; }
    .empty-state i { font-size: 48px; color: var(--text-muted); margin-bottom: 16px; }
    .empty-state h3 { margin-bottom: 8px; }
    .empty-state p { color: var(--text-secondary); margin-bottom: 20px; }
  </style>
</head>
<body>
  <div id="navbar-container"></div>

  <div style="max-width:900px;margin:0 auto;padding:24px">
    <h1 style="margin-bottom:20px"><i class="fas fa-receipt"></i> Mes commandes</h1>

    <div class="statut-filtres" id="statutFiltres">
      <button class="active" data-statut="">Toutes</button>
      <button data-statut="en_attente">En attente</button>
      <button data-statut="confirmee">Confirmées</button>
      <button data-statut="expediee">Expédiées</button>
      <button data-statut="livree">Livrées</button>
      <button data-statut="annulee">Annulées</button>
    </div>

    <div id="commandesList">
      <div style="text-align:center;padding:40px;color:var(--text-muted)">
        <i class="fas fa-spinner fa-spin" style="font-size:28px"></i>
        <p style="margin-top:12px">Chargement...</p>
      </div>
    </div>
  </div>

  <div id="footer-container"></div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="/js/auth.js"></script>
  <script src="/js/navbar.js"></script>
  <script src="/js/commandes.js"></script>
  <script>
    const STATUT_ORDER = ['en_attente', 'confirmee', 'expediee', 'livree'];
    let toutesCommandes = [];

    document.addEventListener('DOMContentLoaded', () => {
      if (document.getElementById('commandesList')) {
        chargerCommandes();
        initialiserFiltres();
      }
    });

    function initialiserFiltres() {
      document.querySelectorAll('.statut-filtres button').forEach(btn => {
        btn.addEventListener('click', () => {
          document.querySelectorAll('.statut-filtres button').forEach(b => b.classList.remove('active'));
          btn.classList.add('active');
          afficherCommandes();
        });
      });
    }

    async function chargerCommandes() {
      const container = document.getElementById('commandesList');
      const token = localStorage.getItem('token');

      if (!token) {
        container.innerHTML = '<div class="empty-state"><i class="fas fa-receipt"></i><h3>Connectez-vous</h3><p>Veuillez vous connecter pour voir vos commandes.</p><a href="/views/auth/login.html" class="btn btn-primary">Connexion</a></div>';
        return;
      }

      try {
        const res = await fetch(API + '/commandes/mes', {
          headers: { 'Authorization': 'Bearer ' + token }
        });
        const data = await res.json();

        if (data.success) {
          toutesCommandes = data.data;
          afficherCommandes();
        }
      } catch (e) {
        container.innerHTML = '<div class="empty-state"><i class="fas fa-exclamation-triangle"></i><h3>Erreur</h3><p>Impossible de charger vos commandes.</p></div>';
      }
    }

    function afficherCommandes() {
      const container = document.getElementById('commandesList');
      const actif = document.querySelector('.statut-filtres button.active');
      const filtre = actif ? actif.dataset.statut : '';

      let commandes = toutesCommandes;
      if (filtre) commandes = commandes.filter(c => c.statut === filtre);

      if (commandes.length === 0) {
        container.innerHTML = '<div class="empty-state"><i class="fas fa-receipt"></i><h3>Aucune commande</h3><p>' + (filtre ? 'Aucune commande avec ce statut.' : 'Vous n\'avez pas encore passé de commande.') + '</p><a href="/views/produits/catalogue.html" class="btn btn-primary"><i class="fas fa-store"></i> Commencer mes achats</a></div>';
        return;
      }

      container.innerHTML = commandes.map(c => {
        const idxCourant = STATUT_ORDER.indexOf(c.statut);
        const ref = c._id.toString().slice(-6).toUpperCase();
        const date = new Date(c.createdAt).toLocaleDateString('fr-FR', { day: 'numeric', month: 'long', year: 'numeric', hour: '2-digit', minute: '2-digit' });

        return `
          <div class="commande-card">
            <div class="header">
              <span class="ref"><i class="fas fa-receipt"></i> #${ref}</span>
              <span class="date"><i class="far fa-calendar-alt"></i> ${date}</span>
              <span class="badge ${c.statut === 'annulee' ? 'badge-cancelled' : (idxCourant < 0 ? 'badge-pending' : (c.statut === 'confirmee' ? 'badge-confirmed' : (c.statut === 'expediee' ? 'badge-shipped' : (c.statut === 'livree' ? 'badge-delivered' : 'badge-pending'))))}">
                ${STATUT_LABELS[c.statut] || c.statut}
              </span>
            </div>
            <div class="produits">
              ${c.lignes.map(l => `
                <div class="prod-line">
                  <span class="nom">${l.nom_produit}</span>
                  <span class="qty">x${l.quantite}</span>
                  <span class="prix">${(l.prix_unitaire * l.quantite).toFixed(2)}FBU</span>
                </div>
              `).join('')}
            </div>
            ${c.statut !== 'annulee' ? `
            <div class="timeline">
              ${STATUT_ORDER.map((s, i) => {
                const stepClass = i < idxCourant ? 'done' : (i === idxCourant ? 'current' : '');
                return `
                  <div class="timeline-step ${stepClass}">
                    <i class="fas ${i < idxCourant ? 'fa-check-circle' : (i === idxCourant ? 'fa-circle' : 'fa-circle')}"></i>
                    <span>${STATUT_LABELS[s]}</span>
                  </div>
                  ${i < STATUT_ORDER.length - 1 ? '<i class="fas fa-chevron-right timeline-arrow"></i>' : ''}
                `;
              }).join('')}
            </div>
            ` : ''}
            <div class="footer">
              <div></div>
              <div class="total">Total : <span>${c.montant_total.toFixed(2)}FBU</span></div>
            </div>
          </div>
        `;
      }).join('');
    }
  </script>
</body>
</html>
