<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>StockPro — Confirmation</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="/css/style.css">
  <script src="/js/theme.js"></script>
  <style>
    .confirmation { max-width: 520px; margin: 40px auto; text-align: center; padding: 40px 20px; }
    .confirmation .success-icon { width: 80px; height: 80px; border-radius: 50%; background: var(--green-100); color: var(--green-400); display: flex; align-items: center; justify-content: center; font-size: 36px; margin: 0 auto 20px; }
    .confirmation h1 { font-size: 24px; margin-bottom: 8px; }
    .confirmation .sub { color: var(--text-secondary); margin-bottom: 24px; }
    .confirmation .details { background: var(--bg-700); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 20px; margin-bottom: 24px; text-align: left; }
    .confirmation .details .row { display: flex; justify-content: space-between; padding: 8px 0; font-size: 14px; }
    .confirmation .details .row .label { color: var(--text-secondary); }
    .confirmation .details .row .value { color: var(--text-primary); font-weight: 500; }
    .confirmation .actions { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; }
  </style>
</head>
<body>
  <div id="navbar-container"></div>

  <div class="confirmation">
    <div class="success-icon"><i class="fas fa-check"></i></div>
    <h1>Commande passée avec succès !</h1>
    <p class="sub">Vous recevrez une notification à chaque changement de statut.</p>

    <div class="details">
      <div class="row">
        <span class="label">Référence</span>
        <span class="value" id="commandeRef">---</span>
      </div>
      <div class="row">
        <span class="label">Total</span>
        <span class="value" id="montantTotal">0.00FBU</span>
      </div>
      <div class="row">
        <span class="label">Statut</span>
        <span class="value" id="statutCommande">---</span>
      </div>
    </div>

    <div class="actions">
      <a href="/views/produits/catalogue.html" class="btn btn-primary"><i class="fas fa-store"></i> Retour au catalogue</a>
      <a href="/views/commandes/commandes.html" class="btn btn-secondary"><i class="fas fa-receipt"></i> Voir mes commandes</a>
    </div>
  </div>

  <div id="footer-container"></div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="/js/auth.js"></script>
  <script src="/js/navbar.js"></script>
  <script src="/js/commandes.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      if (document.getElementById('commandeRef')) {
        chargerConfirmation();
      }
    });

    async function chargerConfirmation() {
      const params = new URLSearchParams(window.location.search);
      const id = params.get('id');
      if (!id) return;

      try {
        const res = await fetch(API + '/commandes/mes', {
          headers: { 'Authorization': 'Bearer ' + localStorage.getItem('token') }
        });
        const data = await res.json();

        if (data.success) {
          const commande = data.data.find(c => c._id === id);
          if (commande) {
            document.getElementById('commandeRef').textContent = '#' + commande._id.toString().slice(-6).toUpperCase();
            document.getElementById('montantTotal').textContent = commande.montant_total.toFixed(2) + 'FBU';
            document.getElementById('statutCommande').textContent = STATUT_LABELS[commande.statut] || commande.statut;
          }
        }
      } catch (e) {}
    }
  </script>
</body>
</html>
